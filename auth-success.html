<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studio Amigo — Signed in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0a0a0a; color: #eee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; text-align: center;
    }
    .card {
      max-width: 460px; padding: 32px;
      background: #141414; border: 1px solid #262626; border-radius: 12px;
    }
    h1 { font-size: 24px; margin: 0 0 12px; color: #4ade80; }
    p { margin: 8px 0; opacity: 0.75; font-size: 14px; line-height: 1.5; }
    .countdown {
      font-size: 48px; font-weight: 600; color: #4ade80;
      margin: 20px 0 8px; font-variant-numeric: tabular-nums;
    }
    .hint { opacity: 0.5; font-size: 13px; margin-top: 20px; }
    kbd {
      background: #262626; padding: 2px 6px; border-radius: 4px;
      font-family: ui-monospace, monospace; font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Signed in ✓</h1>
    <p>Studio Amigo is opening in the background.</p>
    <div class="countdown" id="countdown">5</div>
    <p>Closing this tab…</p>
    <p class="hint">
      If it doesn't close automatically, press <kbd>Ctrl</kbd>+<kbd>W</kbd> to close it.
    </p>
  </div>
  <script>
    (function () {
      var payload = location.hash || location.search
      if (payload) {
        location.replace('studio-amigo://auth-callback' + payload)
      }
      var el = document.getElementById('countdown')
      var n = 5
      var tick = setInterval(function () {
        n -= 1
        if (el) el.textContent = String(Math.max(n, 0))
        if (n <= 0) {
          clearInterval(tick)
          try { window.close() } catch (e) { /* browser blocked */ }
        }
      }, 1000)
    })()
  </script>
</body>
</html>
