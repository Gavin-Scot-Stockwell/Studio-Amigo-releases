<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studio Amigo — Signed in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0a0a0a; color: #eee;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; text-align: center;
    }
    .card {
      max-width: 460px; padding: 32px;
      background: #141414; border: 1px solid #262626; border-radius: 12px;
    }
    h1 { font-size: 24px; margin: 0 0 12px; color: #4ade80; }
    p { margin: 8px 0; opacity: 0.75; font-size: 14px; line-height: 1.5; }
    .open-btn {
      display: inline-block; margin-top: 20px;
      padding: 12px 24px; background: #22c55e; color: #000;
      text-decoration: none; border-radius: 8px; font-weight: 600;
      font-size: 15px;
    }
    .open-btn:hover { background: #4ade80; }
    .hint { opacity: 0.5; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Signed in ✓</h1>
    <p>Studio Amigo should open automatically.</p>
    <a id="open-app" class="open-btn" href="#">Open Studio Amigo</a>
  </div>
  <script>
    (function () {
      var payload = location.hash || location.search
      var target = 'studio-amigo://auth-callback' + (payload || '')
      var link = document.getElementById('open-app')
      if (link) link.href = target
      if (payload) {
        location.replace(target)
      }
    })()
  </script>
</body>
</html>
